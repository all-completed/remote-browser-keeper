name: build

# Builds unsigned desktop artifacts for every OS + arch:
#   macOS  : x64 (Intel) + arm64 (Apple Silicon)   — dmg + zip
#   Linux  : x64 (Intel) + arm64                    — AppImage + tar.gz
#   Windows: x64 (Intel) + arm64                    — nsis installer + portable
on:
  push:
    branches: ["**"]
    tags: ["v*"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer (Vite)
        run: npm run build:ui

      - name: Build (${{ matrix.platform }}, x64 + arm64)
        run: npx electron-builder --${{ matrix.platform }} --x64 --arm64 --publish never
        env:
          # Don't attempt macOS code signing in CI (artifacts are unsigned).
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: remote-browser-keeper-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.tar.gz

  # On a version tag (vX.Y.Z), gather the per-OS installers and publish a GitHub
  # Release. The Keeper Download page links to /releases/latest/download/<asset>, so
  # the asset names must be the canonical ones set via electron-builder artifactName.
  release:
    name: release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect installers
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.dmg' -o -name '*.exe' -o -name '*.AppImage' \) -exec cp -v {} release/ \;
          echo "--- release assets ---"; ls -la release

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          fail_on_unmatched_files: true
          generate_release_notes: true
