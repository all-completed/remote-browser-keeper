name: build

# Builds unsigned desktop artifacts for every OS + arch:
#   macOS  : x64 (Intel) + arm64 (Apple Silicon)   — dmg + zip
#   Linux  : x64 (Intel) + arm64                    — AppImage + tar.gz
#   Windows: x64 (Intel) + arm64                    — nsis installer + portable
on:
  push:
    branches: ["**"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer (Vite)
        run: npm run build:ui

      - name: Build (${{ matrix.platform }}, x64 + arm64)
        run: npx electron-builder --${{ matrix.platform }} --x64 --arm64 --publish never
        env:
          # Don't attempt macOS code signing in CI (artifacts are unsigned).
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: remote-browser-keeper-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.tar.gz
