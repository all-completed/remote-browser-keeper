<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
    <link rel="stylesheet" href="cards.css" />
    <title>Saved cards</title>
  </head>
  <body>
    <div id="glow"></div>
    <main id="wrap">
      <header id="head">
        <div id="title">Saved cards</div>
        <div id="sub">Stored locally for unattended card fill. Card values stay on this machine and are never sent to the AI.</div>
      </header>

      <label class="toggle">
        <input type="checkbox" id="autofill" />
        <span>Auto-fill card requests without prompting</span>
      </label>

      <div class="cardbar">
        <select id="cardSel" aria-label="Select card"></select>
        <button id="newCard" type="button" class="ghost">+ New</button>
        <button id="delCard" type="button" class="ghost danger">Delete</button>
      </div>

      <form id="form" autocomplete="off">
        <label class="fld"><span>Name / id</span><input id="f_id" type="text" placeholder="visa" /></label>
        <label class="check"><input type="checkbox" id="f_default" /><span>Use this card by default</span></label>
        <label class="fld"><span>Auto-fill on these sites — one per line (silent, no prompt)</span><textarea id="f_domains" rows="2" placeholder="amazon.com&#10;shop.example.com"></textarea></label>
        <label class="fld"><span>Cardholder</span><input id="f_holder" type="text" placeholder="JOHN Q DOE" /></label>

        <label class="fld"><span>Card number</span>
          <span class="inrow"><input id="f_number" type="password" inputmode="numeric" placeholder="•••• •••• •••• ••••" /><button type="button" class="reveal" data-for="f_number">👁</button></span>
        </label>

        <div class="grid3">
          <label class="fld"><span>Exp month</span><input id="f_month" type="text" inputmode="numeric" maxlength="2" placeholder="12" /></label>
          <label class="fld"><span>Exp year</span><input id="f_year" type="text" inputmode="numeric" maxlength="4" placeholder="2028" /></label>
          <label class="fld"><span>CVV</span>
            <span class="inrow"><input id="f_cvv" type="password" inputmode="numeric" maxlength="4" placeholder="•••" /><button type="button" class="reveal" data-for="f_cvv">👁</button></span>
          </label>
        </div>

        <fieldset class="billing">
          <legend>Billing address</legend>
          <label class="fld"><span>Address line 1</span><input id="f_b_line1" type="text" /></label>
          <label class="fld"><span>Address line 2</span><input id="f_b_line2" type="text" /></label>
          <div class="grid2">
            <label class="fld"><span>City</span><input id="f_b_city" type="text" /></label>
            <label class="fld"><span>ZIP / Postcode</span><input id="f_b_zip" type="text" /></label>
          </div>
          <div class="grid2">
            <label class="fld"><span>State / Region</span><input id="f_b_state" type="text" /></label>
            <label class="fld"><span>Country</span><input id="f_b_country" type="text" placeholder="US" /></label>
          </div>
        </fieldset>
      </form>

      <p class="warn" id="empty" hidden>No cards yet. Click <strong>+ New</strong> to add one.</p>
      <p class="warn">⚠ Stored in plaintext on this machine (chmod 600). Omit the CVV to be prompted for it each time.</p>

      <footer id="foot">
        <span id="status"></span>
        <button id="save" type="button" class="primary">Save</button>
      </footer>
    </main>
    <script src="cards.js"></script>
  </body>
</html>
