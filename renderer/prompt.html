<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src data:; style-src 'self' 'unsafe-inline'; script-src 'self'" />
    <link rel="stylesheet" href="prompt.css" />
    <title>Remote Browser Keeper</title>
  </head>
  <body>
    <div id="glow"></div>
    <main id="card">
      <header id="head">
        <div id="headtext">
          <div id="title">A remote session needs a value</div>
          <div id="meta">
            <span id="session" class="chip"></span>
            <a id="url" class="chip url" hidden></a>
          </div>
        </div>
      </header>

      <p id="message" hidden></p>

      <figure id="proof" class="proof" hidden>
        <img id="proofImg" alt="The fields the service will fill" />
        <figcaption>The fields the service will fill — proof · click to enlarge</figcaption>
      </figure>

      <div id="fields"></div>

      <p id="note">Sent to the service and typed into the form for you. Never shown to the AI model.</p>

      <div id="actions">
        <button id="cancel" type="button">Cancel</button>
        <button id="send" type="button">Send</button>
      </div>
    </main>
    <script src="prompt.js"></script>
  </body>
</html>
